  <body>
    <div class="main">
      <div class="margen">

        <div class="cuadro">
          <input type="number" id="num1" />
          <input type="number" id="num2" />

        <div class="botones">
          <button onclick="sumar()">+</button>
          <button onclick="restar()">-</button>

          <button onclick="potencia()">potencia</button>
          <button onclick="raizCuadrada()">raíz</button>

          <p id="resultado"></p>
        </div>

        <script src="script.E3.js"></script>

    </div>
